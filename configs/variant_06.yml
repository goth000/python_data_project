variant_id: '06'
theme: Погода (архив) - Токио
source_type: open_meteo
entity:
  city_id: JP_TYO
  city_name: Токио
  country_code: JP
  latitude: 35.6762
  longitude: 139.6503
  timezone: Asia/Tokyo
api:
  base_url: https://archive-api.open-meteo.com/v1/archive
  method: GET
  params:
    latitude: 35.6762
    longitude: 139.6503
    timezone: Asia/Tokyo
    start_date: 2024-05-01
    end_date: 2024-05-07
    hourly:
    - temperature_2m
    - relative_humidity_2m
    - precipitation
    - wind_speed_10m
  notes: Ключ не требуется. Даты задаются параметрами start_date/end_date для archive.
normalized_schema:
- name: ts
  type: timestamp
  desc: Дата-время измерения (локальная TZ).
- name: temperature_2m
  type: float
  desc: Температура на 2м, °C.
- name: relative_humidity_2m
  type: float
  desc: Отн. влажность, %.
- name: precipitation
  type: float
  desc: Осадки, мм.
- name: wind_speed_10m
  type: float
  desc: Скорость ветра, км/ч или м/с (уточнить в docs).
- name: city_id
  type: string
  desc: ID города из reference/cities.csv.
kpis:
- Средняя температура по дням (T_mean).
- Суммарные осадки по дням (P_sum).
- Топ-5 дней по максимальной скорости ветра.
- Количество часов с осадками > 0 (rainy_hours) по дням.
dq_rules:
- name: non_empty
  type: non_empty
  severity: critical
- name: not_null_date
  type: not_null
  column: date
  severity: critical
- name: not_null_city_id
  type: not_null
  column: city_id
  severity: critical
- name: unique_business_key
  type: unique
  columns:
  - date
  - city_id
  severity: critical
- name: temperature_range
  type: numeric_range
  column: t_mean
  min: -80
  max: 60
  severity: warning
- name: non_negative_precipitation
  type: numeric_range
  column: precipitation_sum
  min: 0
  severity: critical
- name: non_negative_wind
  type: numeric_range
  column: wind_speed_max
  min: 0
  severity: warning
dashboard_questions:
- Как менялась температура по дням? Есть ли резкие скачки?
- Сколько было 'дождливых часов' по дням и какие дни лидируют?
- Связь ветра и осадков (scatter/корреляция на дневных агрегатах).
