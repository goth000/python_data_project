variant_id: '06'
theme: Погода (архив) - Токио
source_type: open_meteo
entity:
  city_id: JP_TYO
  city_name: Токио
  country_code: JP
  latitude: 35.6762
  longitude: 139.6503
  timezone: Asia/Tokyo
api:
  base_url: https://archive-api.open-meteo.com/v1/archive
  method: GET
  params:
    latitude: 35.6762
    longitude: 139.6503
    timezone: Asia/Tokyo
    start_date: 2024-05-01
    end_date: 2024-05-07
    hourly:
    - temperature_2m
    - relative_humidity_2m
    - precipitation
    - wind_speed_10m
  notes: Ключ не требуется. Даты задаются параметрами start_date/end_date для archive.
normalized_schema:
- name: ts
  dtype: datetime
  nullable: false
  unit: Asia/Tokyo local time
  description: Дата-время измерения.
- name: temperature_2m
  dtype: float
  nullable: false
  unit: °C
  description: Температура воздуха на высоте 2 м.
- name: relative_humidity_2m
  dtype: integer
  nullable: false
  unit: '%'
  description: Относительная влажность на высоте 2 м.
- name: precipitation
  dtype: float
  nullable: false
  unit: mm
  description: Количество осадков за час.
- name: wind_speed_10m
  dtype: float
  nullable: false
  unit: km/h
  description: Скорость ветра на высоте 10 м.
- name: city_id
  dtype: string
  nullable: false
  unit: none
  description: Идентификатор города из reference/cities.csv.
mart_schema:
- name: date
  dtype: date
  nullable: false
  unit: YYYY-MM-DD
  description: Дата дневной агрегации в timezone города.
- name: city_id
  dtype: string
  nullable: false
  unit: none
  description: Идентификатор города.
- name: city_name
  dtype: string
  nullable: false
  unit: none
  description: Название города.
- name: country_code
  dtype: string
  nullable: false
  unit: ISO 3166-1 alpha-2
  description: Двухбуквенный код страны.
- name: timezone
  dtype: string
  nullable: false
  unit: IANA timezone
  description: Временная зона наблюдений.
- name: t_mean
  dtype: float
  nullable: false
  unit: °C
  description: Средняя температура за день.
- name: t_max
  dtype: float
  nullable: false
  unit: °C
  description: Максимальная температура за день.
- name: precipitation_sum
  dtype: float
  nullable: false
  unit: mm
  description: Суммарное количество осадков за день.
- name: rainy_hours
  dtype: integer
  nullable: false
  unit: hours
  description: Количество часов с осадками больше нуля.
- name: wind_speed_max
  dtype: float
  nullable: false
  unit: km/h
  description: Максимальная скорость ветра за день.
kpis:
- Средняя температура по дням (T_mean).
- Суммарные осадки по дням (P_sum).
- Топ-5 дней по максимальной скорости ветра.
- Количество часов с осадками > 0 (rainy_hours) по дням.
dq_rules:
- name: non_empty
  type: non_empty
  severity: critical
- name: not_null_date
  type: not_null
  column: date
  severity: critical
- name: not_null_city_id
  type: not_null
  column: city_id
  severity: critical
- name: unique_business_key
  type: unique
  columns:
  - date
  - city_id
  severity: critical
- name: temperature_range
  type: numeric_range
  column: t_mean
  min: -80
  max: 60
  severity: warning
- name: non_negative_precipitation
  type: numeric_range
  column: precipitation_sum
  min: 0
  severity: critical
- name: non_negative_wind
  type: numeric_range
  column: wind_speed_max
  min: 0
  severity: warning
dashboard_questions:
- Как менялась температура по дням? Есть ли резкие скачки?
- Сколько было 'дождливых часов' по дням и какие дни лидируют?
- Связь ветра и осадков (scatter/корреляция на дневных агрегатах).
